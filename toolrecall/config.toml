# ToolRecall — Configuration
#
# Loaded via toolrecall.toml in current directory or ~/.config/toolrecall.
# All paths, TTLs, and ports are configurable.
# Environment variables (TOOLRECALL_*) override everything.

# ─── Core Paths ───────────────────────────
[paths]
cache_db = "~/.toolrecall/cache.db"        # Tool output cache
knowledge_db = "~/.toolrecall/knowledge.db" # FTS5 knowledge base

# ─── Storage Backend ──────────────────────
[storage]
backend = "sqlite"  # "sqlite" or "libsql" (pip install toolrecall[libsql])
# libsql_db = "~/.toolrecall/cache-libsql.db"  # separate file — switching back to sqlite3 is safe

# -- Turso Cloud sync (optional, libsql backend only) --
# SECURITY: sync replicates the ENTIRE cache -- including cached file
#   contents, terminal stdout/stderr, and MCP responses -- to Turso Cloud.
#   Only enable if you are comfortable with that data leaving this machine.
# Sync is OFF by default. All three of sync_enabled, sync_url and sync_token
# must be set for sync to run.
# sync_enabled = false          # master switch -- explicit opt-in required
# sync_url = "libsql://my-db.turso.io"
# sync_token = "..."  # Turso auth token
# sync_interval = 60   # seconds between syncs, 0 = disabled

# ─── Cache TTLs (seconds, -1 = infinite) ──
[cache]
file_ttl = -1          # read_file: until file modification (mtime)
skill_ttl = -1         # skill_view: until skill update
terminal_default_ttl = 300  # 5 minutes for unknown commands

# Optional: use SHA256 instead of MD5 for cache key hashing.
# MD5 is fine for non-cryptographic cache keying (default).
# SHA256 is stricter — enables in environments that audit hash strength.
# ⚠️ Switching algorithm invalidates ALL existing cache entries
#    (cache keys differ, old entries stay in DB as orphans).
# Values: "md5" (default) or "sha256"
# hash_algorithm = "md5"

# When true, log a WARNING when shell=True fallback is used
# (occurs when shlex.split() fails on a complex command).
# Default: true — helps detect if the agent is being tricked
# into using unsafe shell execution paths.
log_shell_fallback = true

[cache.terminal_ttls]
"hostname" = 3600
"whoami" = 3600
"pwd" = 3600
"uname -a" = 3600
"crontab -l" = 3600

# ─── File Indexing ────────────────────────

[nginx]
site_name = "toolrecall"
domain = "localhost"
ssl = false
ssl_cert = ""
ssl_key = ""

# ─── MCP Server Security ────────────────
[security]
# 🛡️ MCP Tool Access Control — default-deny for state-modifying tools
#
# ═══ WHAT THIS DOES ═══
# When enabled, ToolRecall BLOCKS MCP tools whose names contain any substring
# from dangerous_tool_keywords below. This only affects the MCP Multiplexer
# (the github, time, fetch, etc. servers) — it does NOT affect cached_read,
# cached_skill, cached_mcp, or other file-caching tools, which have their own
# path-based allowlist.
#
# ═══ RISK OF ADDING KEYWORDS ═══
# Adding a keyword like "write" or "push" is a SUBSTRING MATCH:
#   - "write_file"           → blocked ✅
#   - "create_repository"    → blocked ✅
#   - "push_files"           → blocked ✅
#   - "set_temperature"      → blocked by "set" keyword (unexpected!)
#   - "update_issue"         → blocked by "update" keyword
#   - "post_to_slack"        → NOT blocked (no keyword matches)
#
# Partial matches are inherent — "edit" blocks "credit_score" and
# "run" blocks "runoff_election". The longer your keyword list, the
# higher the chance of false positives. Add terms cautiously.
#
# ═══ DEFAULT: DISABLED (empty list) ═══
# The list below is EMPTY by default. Setting tool_access_control=true
# with an empty list blocks NOTHING — you must explicitly add keywords
# to activate filtering. This forces a conscious choice about what
# operations you want to restrict.
#
# 🔐 For real sandboxing: combine with Docker/gVisor/cgroups.
#    This is a naming convention check, NOT process isolation.
tool_access_control = false

# Tools whose names contain these substrings will be blocked when tool_access_control = true
# Note: substring match only — works for English tool names, partial matches possible
# EMPTY by default — set tool_access_control=true AND add keywords below to activate filtering
dangerous_tool_keywords = []

[mcp]
# ⚠️ SECURITY: Filesystem access control
#
# DEFAULT-DENY: ONLY directories listed here are readable through ToolRecall's
# MCP file-caching tools (cached_read, cached_mcp tools).
# If this list is empty, NO paths are readable at all.
#
# Default: nothing but ToolRecall's own data dir. You MUST add your project
# directories before any files can be cached. This is intentional — you
# consciously choose what the agent can access.
#
# Consequences of adding a path:
#   ✓ Any file under it becomes readable via MCP cache tools
#   ✗ A prompt-injected agent could read files under these paths
#   🛡️ The sensitive file blocklist (.env, .ssh/, .pem keys) still applies
#      as a secondary safety net within allowed paths
#
# For best security: list only directories the agent needs to read.
allowed_paths = [
    "~", "/etc", "/dev",
]

# ─── Cache Key Normalization (v0.9.0) ────────
# When enabled, tool call arguments are normalized before cache key
# generation: keys are sorted, whitespace stripped, non-semantic fields
# (timestamps, session IDs, etc.) are removed.
# This broadens cache hits when agents rephrase or reorder arguments.
# ⚠️ Changing this setting invalidates existing cache entries.
[norm]
enabled = false

# Sort lists of primitive types (str, int, float, bool, None) during
# normalization.  True (default) broadens cache hits across reordered
# tool arguments.  Set False to preserve argument order, which matters
# for positional CLI args (e.g. `["src", "dst"]` vs `["dst", "src"]`).
sort_lists = true

# Strip leading/trailing whitespace from string values during normalization.
# True (default) broadens cache hits across minor formatting differences.
# Set False to preserve significant whitespace (e.g. patches that differ
# only in trailing newlines).
strip_strings = true

# Whether to cache terminal command output via the shim.
# When enabled, every subprocess.run()/Popen() call is cached through the
# ToolRecall daemon. This includes commands like lsb_release, uname, systemctl,
# etc. that tools commonly use to detect the OS environment.
#
# SECURITY NOTE: Terminal caching means command output is stored in the cache DB.
# This does NOT execute commands — it only caches their output. The shim intercepts
# the subprocess call, asks the daemon if output is cached, and returns cached output
# if available (or passes through the real command and caches the result).
# Default: true (enabled — safe for desktop/VMs, use false for shared/multi-tenant)
allow_terminal = true
allow_invalidate = false

# ═══ Terminal command regex allowlist ═══
# Commands matching these patterns are eligible for terminal caching
# via both the Python shim and the MCP cache-fs server.
# EMPTY LIST (with allow_terminal=true) = ALL COMMANDS ALLOWED (DANGEROUS).
# Only read-only commands should be listed here.
#
# The daemon applies re.search(), so prefix patterns work:
#   "^ls(\\s+|$)" matches ls, ls -la, ls -1, etc.
#   "^cat\\s" matches cat /etc/hostname
# Dangerous commands (rm, sudo, git push, kill, mv) are NOT listed.
# Users bypass with ttl=0 for a single call.
allowed_terminal_commands = [
    "^ls(\\s+|$)",
    "^cat(\\s+|$)",
    "^head(\\s+|$)",
    "^tail(\\s+|$)",
    "^wc(\\s+|$)",
    "^grep(\\s+|$)",
    "^rg(\\s+|$)",
    "^find(\\s+|$)",
    "^fd(\\s+|$)",
    "^git\\s+(status|diff|log|branch|stash|show)",
    "^which(\\s+|$)",
    "^ps\\s",
    "^lsof(\\s+|$)",
    "^python3\\s+--version$",
    "^node\\s+--version$",
    "^pip\\s+list$",
    "^date(\\s+|$)",
    "^cal(\\s+|$)",
    "^hostname(\\s+|$)",
    "^whoami(\\s+|$)",
    "^pwd(\\s+|$)",
    "^uname\\s",
    "^uptime(\\s+|$)",
    "^free\\s",
    "^df\\s",
    "^du\\s",
    "^crontab\\s",
]

# ─── MCP Multiplexer — Security-sensitive servers are opt-in ──
#
# GitHub is intentionally NOT pre-configured here. The GitHub MCP
# server (toolrecall.mcp_github) can read/write repos via your
# GITHUB_TOKEN from ~/.toolrecall/.env — any agent with MCP access
# could call list_repos, push_files, create_repository, etc.
# To enable: uncomment the line below (and set GITHUB_TOKEN in env).
#
# hermes-docs requires Hermes Agent ($AGENT_HOME) — commented out by default.
# Uncomment if you use Hermes.
[mcp_multiplex]
enabled = true
transparent_cache = true
default_ttl = 60
# Server names: auto-resolved via built-in registry or uvx by default.
# Built-in (no external deps): time, github, sequential-thinking, fetch
# External (needs uvx): filesystem, git, memory, brave-search, playwright, slack
# Custom: define command/args in [mcp_multiplex.servers_config] (overrides auto-resolve)
servers = ["time", "sequential-thinking", "cache-fs"]
idle_minutes = 15

# Custom server overrides (optional — auto-resolve is the default).
# Uncomment and customize to override auto-resolved servers:
# [mcp_multiplex.servers_config]
# github = { command = "npx", args = ["-y", "@modelcontextprotocol/server-github"] }
# hermes-docs = { command = "uv", args = ["run", "$AGENT_HOME/scripts/docs_mcp/server.py"] }

# ─── Hermes Integration ─────────────────────
# Hermes uses the OS-level .pth shim (toolrecall/shim.py) for transparent caching.
# No per-agent config or init_scripts needed — the shim patches builtins.open()
# and subprocess.run() on every Python process automatically.
# See: toolrecall shim --install

# ─── Data sources for Knowledge Cache (FTS5) ──────────
[sources]
scan_dirs = [
    "~/.toolrecall",                   # self-docs, setup scripts
]
scan_extensions = [".md", ".py", ".js", ".ts", ".tsx", ".html", ".css", ".json", ".sh"]
scan_ignore = [".git", "node_modules", ".venv", "dist", "build", "__pycache__"]
max_file_kb = 100

[sources.memory]
enabled = true

# ─── Shim Cache (transparent OS-level monkey-patch) ──
# Installed via toolrecall shim install
# See: pip install toolrecall[shim] or toolrecall shim --install
#
# Path prefixes to skip when the shim intercepts open() calls.
# Files matching these prefixes are read directly (bypassing cache).
# Useful for internal infrastructure files that are rewritten constantly
# and never benefit from caching (e.g. Hermes' /tmp/hermes-cwd-* files).
# Empty list = bypass NOTHING (all open() calls go through the shim).
# Override via TOOLRECALL_SHIM_EXCLUDE_PREFIXES env var (comma-separated).
[shim]
exclude_prefixes = [
    "/tmp/hermes-cwd-",   # Hermes terminal cwd tracker
    "/tmp/hermes-snap-",  # Hermes terminal env snapshot
]
